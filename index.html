<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Educating Excellence • AI Abacus Tutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* user-select removed so text can be copied */
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.2s ease;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Light mode (default) */
        :root {
            --bg-gradient-start: #f3e8ff;
            --bg-gradient-end: #dbeafe;
            --card-bg: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border-light: #e5e7eb;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --input-focus: #9333ea;
            --btn-primary: #9333ea;
            --btn-primary-hover: #7e22ce;
            --btn-danger: #ef4444;
            --btn-danger-hover: #dc2626;
            --step-bg: #faf5ff;
            --step-border: #e9d5ff;
            --badge-bg: #dcfce7;
            --badge-text: #166534;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 25px 30px -12px rgba(0, 0, 0, 0.15);
            --abacus-wood: #d4a373;
            --abacus-bg: #f7e9c3;
            --abacus-rod: #8b5a2b;
            --bead-active: #e07a5f;
            --bead-inactive: #edd4b2;
            --bead-upper: #c44536;
            --bead-lower: #f4a261;
        }

        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #09090b;
            --card-bg: #1f1f2e;
            --text-primary: #f3f4f6;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --input-bg: #2d2d3a;
            --input-border: #3f3f4e;
            --input-focus: #a855f7;
            --btn-primary: #a855f7;
            --btn-primary-hover: #c084fc;
            --btn-danger: #f97316;
            --btn-danger-hover: #fb923c;
            --step-bg: #2d2d3a;
            --step-border: #4a4a5e;
            --badge-bg: #14532d;
            --badge-text: #bbf7d0;
            --abacus-wood: #b5835a;
            --abacus-bg: #2a241a;
            --abacus-rod: #aa8c5e;
            --bead-active: #e9b35f;
            --bead-inactive: #7a6a52;
            --bead-upper: #e07a5f;
            --bead-lower: #f4c97e;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
        }

        /* Layout */
        .main-grid {
            display: flex;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
            flex-wrap: wrap;
        }
        .left-col {
            flex: 1.4;
            min-width: 280px;
        }
        .right-col {
            flex: 1;
            min-width: 420px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 1rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 20px;
        }
        .brand-text {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #9333ea, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.dark .brand-text {
            background: linear-gradient(135deg, #c084fc, #e9d5ff);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 1.3rem;
        }
        .theme-toggle:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow);
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.2rem;
        }
        .input-field {
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            border-radius: 1.5rem;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.2);
        }
        .btn-primary {
            background: var(--btn-primary);
            border: none;
            padding: 0 1.8rem;
            border-radius: 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--btn-primary-hover);
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .voice-btn {
            background: var(--btn-danger);
            width: 100%;
            padding: 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-btn:hover:not(:disabled) {
            background: var(--btn-danger-hover);
            transform: scale(1.01);
        }
        .examples {
            margin-top: 1.5rem;
        }
        .examples-label {
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
        }
        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .example-chip {
            background: var(--step-bg);
            border: 1px solid var(--step-border);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .example-chip:hover {
            background: var(--btn-primary);
            color: white;
            border-color: var(--btn-primary);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .problem-text { font-size: 1.6rem; font-weight: 700; }
        .answer-badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 2rem;
            font-weight: 800;
        }
        .explanation {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1.8rem;
            color: var(--text-secondary);
        }
        .steps-title {
            font-weight: 700;
            color: var(--btn-primary);
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;   /* reduced line spacing */
        }
        .step-item {
            background: var(--step-bg);
            border-left: 4px solid var(--btn-primary);
            padding: 0.45rem 0.9rem;
            border-radius: 0.85rem;
            font-size: 0.9rem;
            line-height: 1.3;
        }
        .step-number { font-weight: 800; color: var(--btn-primary); margin-right: 0.6rem; }
        .new-problem-btn {
            width: 100%;
            background: var(--step-bg);
            border: 1px solid var(--border-light);
            padding: 1rem;
            border-radius: 2rem;
            font-weight: 500;
            margin-top: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .new-problem-btn:hover { background: var(--btn-primary); color: white; border-color: transparent; }
        .error-panel {
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            font-weight: 500;
        }
        .hidden { display: none; }
        .spinner { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- SOROBAN ABACUS STYLES ---------- */
        .abacus-card { text-align: center; }
        .abacus-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--btn-primary);
        }
        .abacus-value-panel {
            margin-top: 1rem;
            background: var(--step-bg);
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: bold;
        }
        .abacus-value { font-size: 2rem; font-weight: 800; color: var(--btn-primary); margin-left: 0.5rem; }
        .abacus-hint { font-size: 0.75rem; margin-top: 0.8rem; color: var(--text-secondary); }
        
        .soroban-container {
            background: var(--abacus-wood);
            border-radius: 2rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: var(--abacus-bg);
            border-radius: 20px;
            width: 100%;
            height: auto;
            aspect-ratio: 700 / 380;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.1), 0 8px 20px rgba(0,0,0,0.2);
        }
        .rod-controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .rod-control {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border-light);
            font-size: 0.8rem;
        }
        .rod-control button {
            background: var(--btn-primary);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }
        .rod-control button:hover { background: var(--btn-primary-hover); transform: scale(1.05);}
        .rod-label {
            font-weight: 600;
            min-width: 55px;
            text-align: center;
        }
        @media (max-width: 720px) {
            .rod-control { font-size: 0.7rem; }
            .rod-label { min-width: 45px; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo-area">
        <img src="https://github.com/Riyaz18/ai-qa-feature/blob/main/Screenshot%202026-04-08%20181201.png?raw=true" 
             alt="Logo" class="logo-img" 
             onerror="this.src='https://via.placeholder.com/100?text=AG'">
        <span class="brand-text">AI Abacus Tutor </span>
    </div>
    <button class="theme-toggle" id="darkModeToggle" aria-label="Dark mode">
        <i id="themeIcon" class="fas fa-moon"></i>
    </button>
</div>

<div class="main-grid">
    <!-- LEFT COLUMN: AI Tutor -->
    <div class="left-col">
        <div class="card">
            <div class="input-group">
                <input type="text" id="problemInput" class="input-field" placeholder="e.g., 25 plus 8 or 12 × 4">
                <button id="solveBtn" class="btn-primary"><span id="solveText">Solve</span><i id="solveSpinner" class="fas fa-spinner spinner hidden"></i></button>
            </div>
            <button id="voiceBtn" class="voice-btn"><i id="voiceIcon" class="fas fa-microphone"></i><span id="voiceLabel">Speak Your Problem</span></button>
            <div class="examples">
                <div class="examples-label">✨ Try these:</div>
                <div class="example-buttons">
                    <button class="example-chip" data-example="18 plus 7">18 + 7</button>
                    <button class="example-chip" data-example="25 minus 13">25 - 13</button>
                    <button class="example-chip" data-example="twelve times 8">12 × 8</button>
                    <button class="example-chip" data-example="30 divided by 5">30 ÷ 5</button>
                    <button class="example-chip" data-example="40 minus 27">40 - 27</button>
                </div>
            </div>
        </div>
        <div id="resultPanel" class="card hidden">
            <div class="result-header"><h2 id="problemText" class="problem-text"></h2><div id="answerBadge" class="answer-badge"></div></div>
            <div id="explanationText" class="explanation"></div>
            <div><div class="steps-title"><i class="fas fa-list-ol"></i> Step by Step on Abacus</div><div id="stepsContainer" class="steps-container"></div></div>
            <button id="newProblemBtn" class="new-problem-btn">✨ New Problem</button>
        </div>
        <div id="errorPanel" class="error-panel hidden">⚠️ Please type a problem like <strong>18 plus 7</strong></div>
    </div>

    <!-- RIGHT COLUMN: SOROBAN ABACUS (right-to-left: ones on right) -->
    <div class="right-col">
        <div class="card abacus-card">
            <h3 class="abacus-title"><i class="fas fa-chalkboard"></i> Interactive Abacus Kit </h3>
            <div class="soroban-container">
                <canvas id="sorobanCanvas" width="700" height="380"></canvas>
            </div>
            <div class="rod-controls" id="rodControls"></div>
            <div class="abacus-value-panel">
                <span class="abacus-label">📟 Current Number:</span>
                <span id="abacusNumberDisplay" class="abacus-value">0</span>
            </div>
            <p class="abacus-hint">💡 Click + / – to change digits. Traditional Soroban: highest place left, ones on right. Upper bead = 5, lower beads = 1 each.</p>
        </div>
    </div>
</div>

<script>
    // ---------- DARK MODE ----------
    function initDarkMode() {
        const saved = localStorage.getItem('darkMode');
        if (saved === 'true') { document.body.classList.add('dark'); document.getElementById('themeIcon').classList.replace('fa-moon','fa-sun'); }
        else { document.body.classList.remove('dark'); document.getElementById('themeIcon').classList.replace('fa-sun','fa-moon'); }
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('darkMode', isDark);
        const icon = document.getElementById('themeIcon');
        if (isDark) { icon.classList.replace('fa-moon','fa-sun'); } else { icon.classList.replace('fa-sun','fa-moon'); }
        drawSoroban(); // refresh colors
    }
    document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
    initDarkMode();

    // ---------- SOROBAN ABACUS ENGINE (right-to-left display: ones on right) ----------
    const canvas = document.getElementById('sorobanCanvas');
    const ctx = canvas.getContext('2d');
    let rodsCount = 6;          // ones, tens, hundreds, thousands, ten-thousands, hundred-thousands
    let rodDigits = [0,0,0,0,0,0]; // index 0 = ones, index 5 = hundred-thousands
    const rodLabels = ["Ones","Tens","Hundreds","Thousands","Ten-Th","Hundred-Th"];
    
    // Geometry (recalculated on resize)
    let rodSpacing = 0;
    const upperYcenter = 100;   // Y coordinate of upper bead center
    const lowerStartY = 180;
    const lowerStep = 28;
    const beamY = 148;
    const beadRadius = 12;
    const upperBeadRadius = 13;
    
    function updateSpacing() { rodSpacing = canvas.width / (rodsCount + 1); }
    
    // Convert a digit (0-9) to bead positions: upper down if digit>=5, lower count = digit%5
    function getBeadStates(digit) {
        let upperDown = (digit >= 5);
        let lowerUp = digit % 5;
        return { upperDown, lowerUp };
    }
    
    function drawSoroban() {
        if (!ctx) return;
        updateSpacing();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Wood background
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--abacus-wood').trim() || '#d4a373';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--abacus-bg').trim() || '#f7e9c3';
        ctx.fillRect(12, 12, canvas.width-24, canvas.height-24);
        
        // Beam
        ctx.beginPath();
        ctx.strokeStyle = '#9c7a4a';
        ctx.lineWidth = 4;
        ctx.moveTo(20, beamY);
        ctx.lineTo(canvas.width-20, beamY);
        ctx.stroke();
        ctx.fillStyle = '#c2a15b';
        ctx.fillRect(15, beamY-2, canvas.width-30, 4);
        
        const rodColor = getComputedStyle(document.body).getPropertyValue('--abacus-rod').trim() || '#8b5a2b';
        const upperActiveColor = getComputedStyle(document.body).getPropertyValue('--bead-upper').trim() || '#c44536';
        const lowerActiveColor = getComputedStyle(document.body).getPropertyValue('--bead-lower').trim() || '#f4a261';
        const inactiveColor = getComputedStyle(document.body).getPropertyValue('--bead-inactive').trim() || '#edd4b2';
        
        // Draw rods from highest place (left) to ones (right)
        for (let i = rodsCount - 1; i >= 0; i--) {
            // visual position: highest place (i = rodsCount-1) at leftmost
            const visualIndex = rodsCount - 1 - i;
            const x = rodSpacing * (visualIndex + 1);
            const digit = rodDigits[i];
            const { upperDown, lowerUp } = getBeadStates(digit);
            
            // vertical rod
            ctx.beginPath();
            ctx.strokeStyle = rodColor;
            ctx.lineWidth = 3;
            ctx.moveTo(x, 40);
            ctx.lineTo(x, canvas.height-45);
            ctx.stroke();
            
            // Upper bead (heaven)
            let upperY = upperYcenter;
            if (!upperDown) upperY = upperYcenter - 18; // away from beam
            ctx.beginPath();
            ctx.arc(x, upperY, upperBeadRadius, 0, 2*Math.PI);
            ctx.fillStyle = upperDown ? upperActiveColor : inactiveColor;
            ctx.fill();
            ctx.strokeStyle = '#6b4c3b';
            ctx.stroke();
            if (upperDown) {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('5', x-4, upperY+5);
            }
            
            // Lower beads (earth) - 4 beads
            for (let b = 0; b < 4; b++) {
                let y = lowerStartY + b * lowerStep;
                if (y + beadRadius > canvas.height-40) y = canvas.height-40 - beadRadius;
                const isUp = (b < lowerUp);
                let beadY = isUp ? (beamY - 12) : y;
                ctx.beginPath();
                ctx.arc(x, beadY, beadRadius, 0, 2*Math.PI);
                ctx.fillStyle = isUp ? lowerActiveColor : inactiveColor;
                ctx.fill();
                ctx.strokeStyle = '#6b4c3b';
                ctx.stroke();
                if (isUp) {
                    ctx.fillStyle = '#1f1f1f';
                    ctx.font = 'bold 20px monospace';
                    ctx.fillText(b+1, x-4, beadY+4);
                }
            }
            // Label: actual place name
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-primary').trim() || '#111827';
            ctx.font = 'bold 12px system-ui';
            ctx.fillText(rodLabels[i], x-20, canvas.height-18);
        }
    }
    
    function getTotalNumber() {
        let total = 0;
        for (let i = 0; i < rodsCount; i++) total += rodDigits[i] * Math.pow(10, i);
        return total;
    }
    
    function updateNumberDisplay() { document.getElementById('abacusNumberDisplay').innerText = getTotalNumber(); }
    function refreshAbacus() { drawSoroban(); updateNumberDisplay(); }
    
    function setRodDigit(rodIdx, newDigit) {
        if (rodIdx < 0 || rodIdx >= rodsCount) return;
        newDigit = Math.min(9, Math.max(0, newDigit));
        if (rodDigits[rodIdx] === newDigit) return;
        rodDigits[rodIdx] = newDigit;
        refreshAbacus();
    }
    
    function incrementRod(rodIdx) { setRodDigit(rodIdx, rodDigits[rodIdx] + 1); }
    function decrementRod(rodIdx) { setRodDigit(rodIdx, rodDigits[rodIdx] - 1); }
    
    function setAbacusNumber(number) {
        let absNum = Math.floor(Math.abs(number));
        let digits = String(absNum).split('').reverse().map(Number);
        for (let i=0; i<rodsCount; i++) rodDigits[i] = (i < digits.length) ? digits[i] : 0;
        refreshAbacus();
    }
    
    // Build control buttons (highest place on left, ones on right)
    function buildRodControls() {
        const container = document.getElementById('rodControls');
        container.innerHTML = '';
        // show from highest place (left) to lowest (right) in UI
        for (let i = rodsCount-1; i >= 0; i--) {
            const div = document.createElement('div');
            div.className = 'rod-control';
            div.innerHTML = `
                <button class="dec-btn" data-rod="${i}">−</button>
                <span class="rod-label">${rodLabels[i]}</span>
                <button class="inc-btn" data-rod="${i}">+</button>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.inc-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { let rod = parseInt(btn.dataset.rod); incrementRod(rod); });
        });
        document.querySelectorAll('.dec-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { let rod = parseInt(btn.dataset.rod); decrementRod(rod); });
        });
    }
    
    // ---------- AI TUTOR INTEGRATION (connects to abacus) ----------
    let isLoading = false;
    const problemInput = document.getElementById('problemInput');
    const solveBtn = document.getElementById('solveBtn');
    const solveText = document.getElementById('solveText');
    const solveSpinner = document.getElementById('solveSpinner');
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceIcon = document.getElementById('voiceIcon');
    const voiceLabel = document.getElementById('voiceLabel');
    const resultPanel = document.getElementById('resultPanel');
    const errorPanel = document.getElementById('errorPanel');
    const problemTextSpan = document.getElementById('problemText');
    const answerBadge = document.getElementById('answerBadge');
    const explanationDiv = document.getElementById('explanationText');
    const stepsContainer = document.getElementById('stepsContainer');
    const newProblemBtn = document.getElementById('newProblemBtn');
    
    function setLoading(loading, type) {
        isLoading = loading;
        if (type === 'solve') {
            solveBtn.disabled = loading;
            if (loading) { solveText.classList.add('hidden'); solveSpinner.classList.remove('hidden'); }
            else { solveText.classList.remove('hidden'); solveSpinner.classList.add('hidden'); }
        } else if (type === 'voice') {
            voiceBtn.disabled = loading;
            if (loading) { voiceIcon.classList.replace('fa-microphone','fa-spinner'); voiceIcon.classList.add('spinner'); voiceLabel.textContent = 'Listening...'; }
            else { voiceIcon.classList.replace('fa-spinner','fa-microphone'); voiceIcon.classList.remove('spinner'); voiceLabel.textContent = 'Speak Your Problem'; }
        }
    }
    
    function showError(msg) { errorPanel.classList.remove('hidden'); resultPanel.classList.add('hidden'); errorPanel.innerHTML = `⚠️ ${msg || 'Please type 18 plus 7'}`; }
    function hideError() { errorPanel.classList.add('hidden'); }
    function resetUI() { resultPanel.classList.add('hidden'); errorPanel.classList.add('hidden'); problemInput.value = ''; }
    
    function displayResult(data, spokenInput = null) {
        hideError();
        resultPanel.classList.remove('hidden');
        problemTextSpan.textContent = spokenInput || data.problem;
        answerBadge.textContent = `= ${data.result}`;
        explanationDiv.innerHTML = (data.explanation || '').replace(/\n/g, '<br><br>');
        stepsContainer.innerHTML = '';
        if (data.steps && Array.isArray(data.steps)) {
            data.steps.forEach((step, idx) => {
                const div = document.createElement('div'); div.className = 'step-item';
                div.innerHTML = `<span class="step-number">${idx+1}.</span> ${step}`;
                stepsContainer.appendChild(div);
            });
        } else stepsContainer.innerHTML = '<div class="step-item">✨ Abacus steps will appear here.</div>';
        
        // Update Soroban with the result (0-999999)
        if (data.result !== undefined && !isNaN(parseFloat(data.result))) {
            let num = parseFloat(data.result);
            if (num >= 0 && num < 1000000) setAbacusNumber(num);
            else setAbacusNumber(num % 1000000);
        }
    }
    
    async function getSolutionFromApi(problemText) {
        hideError();
        try {
            const res = await fetch(`/ask?problem=${encodeURIComponent(problemText)}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.error) throw new Error();
            displayResult(data);
        } catch (err) { showError("Couldn't solve. Try '18 plus 7'"); }
    }
    
    async function sendText() {
        if (isLoading) return;
        const raw = problemInput.value.trim();
        if (!raw) { showError("Please type a problem like 18 plus 7"); return; }
        setLoading(true, 'solve');
        await getSolutionFromApi(raw);
        setLoading(false, 'solve');
    }
    
    async function startVoice() {
        if (isLoading) return;
        setLoading(true, 'voice');
        try {
            const res = await fetch('/voice-ask');
            const data = await res.json();
            if (data.error) throw new Error();
            const spoken = data.spoken_input || '';
            if (spoken) {
                problemInput.value = spoken;
                if (data.solution) displayResult(data.solution, spoken);
                else await getSolutionFromApi(spoken);
            } else throw new Error();
        } catch(e) { showError("Voice error. Say '18 plus 7'"); }
        finally { setLoading(false, 'voice'); }
    }
    
    function useExample(example) { problemInput.value = example; sendText(); }
    
    solveBtn.addEventListener('click', sendText);
    voiceBtn.addEventListener('click', startVoice);
    newProblemBtn.addEventListener('click', resetUI);
    document.querySelectorAll('.example-chip').forEach(btn => {
        btn.addEventListener('click', () => useExample(btn.getAttribute('data-example')));
    });
    problemInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendText(); });
    
    // Initialize Soroban
    function initAbacus() {
        buildRodControls();
        setAbacusNumber(0);
        window.addEventListener('resize', () => drawSoroban());
        drawSoroban();
    }
    initAbacus();
</script>
</body>
</html>
